global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: taxvision-otel-collector
    # El exporter Prometheus del collector ya trae su propio label "job" por
    # servicio (derivado de service.name via AddTaxVisionOpenTelemetry, ej.
    # "auth-service"/"customer-service") en cada metrica que reenvia — sin
    # honor_labels, Prometheus lo pisa con el job_name de este scrape config
    # (todo quedaria como "taxvision-otel-collector", sin poder distinguir
    # servicio por servicio) y lo manda a "exported_job" en su lugar.
    honor_labels: true
    static_configs:
      - targets:
          - otel-collector:9464

  # Metricas de contenedores (CPU/memoria/IO por servicio, incluye sqlserver/minio).
  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  # Metricas del host (disco, memoria, CPU del server) — critico para vigilar que
  # los volumenes de sqlserver-data/minio-data no se llenen en silencio.
  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
