      # Bug real de producción (2026-07-21): ScribeBaseLayoutSeeder/ScribeNotificationTemplateSeeder/
      # ScribeSystemAssetSeeder/TemplateWarmupService piden un token M2M a auth-api y templates a
      # cloudstorage-api al arrancar. Sin este depends_on, scribe-api podía ganarle la carrera a
      # auth-api (contenedor arriba pero su ASP.NET Core todavía no escuchando en :8080) — logs
      # reales mostraron 13/13 "Connection refused (auth-api:8080)" y "Scribe cache warm-up:
      # 0/13 published template versions loaded". El código ya se arregló (TemplateWarmupService
      # ahora difiere a ApplicationStarted + ServiceTokenAcquirer reintenta), esto cierra la causa
      # raíz de infraestructura para que ninguna de las dos capas tenga que cubrir a la otra sola.
      auth-api:
