services:
  rabbitmq:
    image: rabbitmq:4.3.2-management
    container_name: taxvision-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?Set RABBITMQ_USER in .env}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
    # Solo loopback — igual que sqlserver: nada de esto se expone a la interfaz
    # publica, se accede via VPN + SSH al server (127.0.0.1 desde ahi mismo).
    # 5672 (AMQP) y 15672 (management UI) no los necesita nadie fuera del
    # server: los servicios de la app usan rabbitmq:5672 por DNS interno.
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - taxvision-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2.12-alpine
    container_name: taxvision-redis
    command: ["redis-server", "--appendonly", "yes"]
    # Solo loopback — para redis-cli via VPN+SSH, ningun servicio de la app lo
    # necesita publicado (usan redis:6379 por DNS interno).
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - taxvision-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # MinIO open source (AGPL-3.0), no el producto comercial AIStor: no requiere licencia.
  # Solo para desarrollo/local. En produccion, apunte cloudstorage-api a un S3 gestionado
  # (S3/R2) via las variables Minio__* (ver README seccion 27.5) para evitar la AGPL.
  # Fuente MinIO: https://github.com/minio/minio
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: taxvision-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    # 9000 (API S3) solo loopback: los servicios .NET/Node corridos con `dotnet run`/
    # `npm run dev` en el host (no en Docker) necesitan pegarle a localhost:9000 —
    # sin esto ningun servicio local (ni siquiera CloudStorage) puede alcanzar MinIO.
    # En produccion Caddy le pega a minio:9000 por la red interna de docker (no usa
    # este mapeo), asi que loopback-only no afloja nada ahi. 9001 (consola) igual.
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - taxvision-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  clamav:
    image: clamav/clamav:1.4.3
    container_name: taxvision-clamav
    expose:
      - "3310"
    volumes:
      - clamav-data:/var/lib/clamav
    networks:
      - taxvision-network
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1 >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

  # SQL Server 2022 Developer edition — gratis para no-produccion-comercial-interna
  # (uso propio del negocio, sin redistribuir), version completa sin los limites de
  # Express. En local usa loopback; produccion lo enlaza exclusivamente a la IP
  # privada anunciada por Cloudflare WARP, nunca a 0.0.0.0 ni a la IP publica.
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: taxvision-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env}
    ports:
      - "${SQLSERVER_BIND_ADDRESS:-127.0.0.1}:1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - taxvision-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  loki:
    image: grafana/loki:3.7.2
    container_name: taxvision-loki
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ../observability/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    expose:
      - "3100"
    networks:
      - taxvision-network

  tempo:
    image: grafana/tempo:2.8.2
    container_name: taxvision-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ../observability/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    expose:
      - "3200"
      - "4317"
      - "4318"
    networks:
      - taxvision-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0
    container_name: taxvision-otel-collector
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ../observability/otel-collector.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    expose:
      - "9464"
    depends_on:
      - loki
      - tempo
    networks:
      - taxvision-network

  # Metricas de contenedores (CPU/memoria/IO por servicio) — sin esto Prometheus
  # solo tiene metricas de aplicacion (OTel), cero visibilidad de infraestructura.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: taxvision-cadvisor
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    expose:
      - "8080"
    networks:
      - taxvision-network

  # Metricas del host: disco/memoria/CPU del server — vigila que sqlserver-data
  # y minio-data no se llenen en silencio.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: taxvision-node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    expose:
      - "9100"
    networks:
      - taxvision-network

  prometheus:
    image: prom/prometheus:v3.5.3
    container_name: taxvision-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    # Solo loopback, via VPN+SSH — Grafana ya reexpone lo que hace falta ver.
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - otel-collector
      - cadvisor
      - node-exporter
    networks:
      - taxvision-network

  grafana:
    image: grafana/grafana:13.0.3
    container_name: taxvision-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?Set GRAFANA_ADMIN_USER in .env}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
    # Solo loopback — vos entras via VPN+SSH al server y ahi si abris localhost:3000.
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - taxvision-network

  tenant-api:
    image: taxvision/tenant-api:dev
    container_name: taxvision-tenant-api
    build:
      context: ../..
      dockerfile: src/Services/Tenant/TaxVision.Tenant.Api/Dockerfile
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: ${TENANT_DB_CONNECTION:?Set TENANT_DB_CONNECTION in .env}
      ConnectionStrings__Redis: redis:6379
      RabbitMq__Uri: ${RABBITMQ_CONNECTION:?Set RABBITMQ_CONNECTION in .env}
      # RS256: la clave publica alcanza para validar — la privada vive solo en auth-api.
      Jwt__PublicKeyPath: /run/secrets/jwt-public.pem
      Jwt__Issuer: TaxVision.Auth
      Jwt__Audience: TaxVision.Services
      # Logo del tenant (Tenant_Service_LogoSupport_Plan.md) — cliente M2M para pedir el
      # download-url presignado y borrar el logo reemplazado/quitado (registrado en auth-api,
      # ServiceAuth__Clients__8 mas abajo).
      ServiceAuthClient__AuthBaseUrl: http://auth-api:8080
      ServiceAuthClient__ClientId: ${TENANT_SERVICE_CLIENT_ID:-tenant-worker}
      ServiceAuthClient__ClientSecret: ${TENANT_SERVICE_CLIENT_SECRET:-}
      CloudStorageClient__BaseUrl: http://cloudstorage-api:8080
      # Fase D1 — credenciales MinIO propias para subir el logo (IAM scoped a
      # taxvision-temp/tenant-branding/*, ver deploy/docker/minio/policies/tenant-source.json
      # + el servicio "minio-provision" de este mismo compose). NUNCA MINIO_ROOT_USER/PASSWORD.
      Tenant__Minio__Endpoint: minio:9000
      Tenant__Minio__UseTls: "false"
      Tenant__Minio__AccessKey: tenant-worker
      Tenant__Minio__SecretKey: ${TENANT_MINIO_SECRET:?Set TENANT_MINIO_SECRET in .env}
      Tenant__Minio__TempBucket: taxvision-temp
      Tenant__Minio__SourcePrefix: tenant-branding
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317
    volumes:
      - taxvision-logs:/app/Logs
      - ${TAXVISION_SECRETS_DIR:-/opt/taxvision/secrets}/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - taxvision-network

  auth-api:
    image: taxvision/auth-api:dev
    container_name: taxvision-auth-api
    build:
      context: ../..
      dockerfile: src/Services/Auth/Api/Dockerfile
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: ${AUTH_DB_CONNECTION:?Set AUTH_DB_CONNECTION in .env}
      ConnectionStrings__Redis: redis:6379
      RabbitMq__Uri: ${RABBITMQ_CONNECTION:?Set RABBITMQ_CONNECTION in .env}
      # RS256: unico servicio con la clave privada — firma los JWT y publica el
      # JWKS real en /auth/.well-known/jwks.json (con HS256 ese endpoint
      # devuelve un keyset vacio, ver SigningKeyProvider.cs:65-69 — rompe la
      # validacion de Communication, que SOLO valida via JWKS).
      Jwt__PrivateKeyPath: /run/secrets/jwt-private.pem
      # Auth también valida bearer tokens en sus propios endpoints protegidos
      # (/auth/logout, /auth/me, etc.) — necesita la pública igual que el resto
      # de los servicios, no solo la privada para firmar (README §31.4).
      Jwt__PublicKeyPath: /run/secrets/jwt-public.pem
      Jwt__Issuer: TaxVision.Auth
      Jwt__Audience: TaxVision.Services
      # Dominio base para componer subdominios de tenant (oficina1.taxprocore.com).
      # Explicito en vez de confiar en el default de TenantDomainOptions.cs — mismo
      # valor que usa Caddy para el certificado wildcard (TAXVISION_BASE_DOMAIN).
      TenantDomains__BaseDomain: ${TAXVISION_BASE_DOMAIN:-taxprocore.com}
      # Clave de cifrado de secretos de MFA (AesGcmSecretProtector.cs). Antes caia
      # al fallback derivado de Jwt:Secret, pero ese ya no existe con RS256 —
      # sin esta var explicita, el primer uso de MFA tira InvalidOperationException.
      Mfa__EncryptionKey: ${MFA_ENCRYPTION_KEY:?Set MFA_ENCRYPTION_KEY in .env}
      # Cliente de servicio (M2M) para el worker de Notification: emite tokens con permisos de
      # CloudStorage y (Fase 10.5 hardening) scribe.render — ScribeRenderClient reusa este mismo
      # token M2M para llamar POST /scribe/render, gateado por [HasPermission(ScribePermissions.
      # Render)] (mismo mecanismo que los endpoints humanos de Scribe, no ServiceOnly/actor_type).
      # Sin esta linea el claim "perm" nunca incluia scribe.render y la llamada devolvia 403 real —
      # bug real encontrado y corregido en la Fase 10.5, no solo el permiso sin sembrar en Auth.
      ServiceAuth__Clients__0__ClientId: ${NOTIFICATION_SERVICE_CLIENT_ID:-notification-worker}
      ServiceAuth__Clients__0__Secret: ${NOTIFICATION_SERVICE_CLIENT_SECRET:-}
      ServiceAuth__Clients__0__Permissions__0: cloudstorage.file.upload
      ServiceAuth__Clients__0__Permissions__1: cloudstorage.file.download
      ServiceAuth__Clients__0__Permissions__2: cloudstorage.file.view
      ServiceAuth__Clients__0__Permissions__3: scribe.render
      # Cliente de servicio (M2M) para el worker de Transcripts de Communication (Fase 6):
      # descarga la grabacion, sube el .txt transcrito, mismos permisos de CloudStorage.
      ServiceAuth__Clients__1__ClientId: ${COMMUNICATION_TRANSCRIPT_WORKER_CLIENT_ID:-communication-transcript-worker}
      ServiceAuth__Clients__1__Secret: ${COMMUNICATION_TRANSCRIPT_WORKER_CLIENT_SECRET:-}
      ServiceAuth__Clients__1__Permissions__0: cloudstorage.file.upload
      ServiceAuth__Clients__1__Permissions__1: cloudstorage.file.download
      ServiceAuth__Clients__1__Permissions__2: cloudstorage.file.view
      # Cliente de servicio (M2M) para Signature: descarga el documento pendiente de sellado
      # y sube el PDF sellado/PAdES a CloudStorage (README.md:3352-3362).
      ServiceAuth__Clients__2__ClientId: ${SIGNATURE_SERVICE_CLIENT_ID:-signature-worker}
      ServiceAuth__Clients__2__Secret: ${SIGNATURE_SERVICE_CLIENT_SECRET:-}
      ServiceAuth__Clients__2__Permissions__0: cloudstorage.file.download
      ServiceAuth__Clients__2__Permissions__1: cloudstorage.file.view
      ServiceAuth__Clients__2__Permissions__2: cloudstorage.file.upload
      # Cliente de servicio (M2M) para Customer: sube el Excel/CSV de import directo a MinIO
      # con credenciales propias (ver Customer__Minio__* mas abajo) y solo usa este token para
      # descargarlo de vuelta (parseo de filas) y borrarlo al terminar — nunca para subir.
      ServiceAuth__Clients__3__ClientId: ${CUSTOMER_SERVICE_CLIENT_ID:-customer-worker}
      ServiceAuth__Clients__3__Secret: ${CUSTOMER_SERVICE_CLIENT_SECRET:-}
      ServiceAuth__Clients__3__Permissions__0: cloudstorage.file.download
      ServiceAuth__Clients__3__Permissions__1: cloudstorage.file.view
      ServiceAuth__Clients__3__Permissions__2: cloudstorage.file.delete
      # Cliente de servicio (M2M) para Correspondence (Fase 2): backfill de CustomerEmailAddresses
      # via Customer.Api GET /customers/internal/list (policy ServiceOnly — actor_type=Service
      # alcanza, no requiere ningun "perm" puntual, por eso sin Permissions__N).
      ServiceAuth__Clients__4__ClientId: ${CORRESPONDENCE_SERVICE_CLIENT_ID:-correspondence-worker}
      ServiceAuth__Clients__4__Secret: ${CORRESPONDENCE_SERVICE_CLIENT_SECRET:-}
      # Cliente de servicio (M2M) para Scribe: sube/descarga assets de templates/layouts a
      # CloudStorage (publicar plantillas). Nunca borra.
      ServiceAuth__Clients__5__ClientId: ${SCRIBE_SERVICE_CLIENT_ID:-scribe-worker}
      ServiceAuth__Clients__5__Secret: ${SCRIBE_SERVICE_CLIENT_SECRET:-}
      ServiceAuth__Clients__5__Permissions__0: cloudstorage.file.upload
      ServiceAuth__Clients__5__Permissions__1: cloudstorage.file.download
      ServiceAuth__Clients__5__Permissions__2: cloudstorage.file.view
      # Cliente de servicio (M2M) para Postmaster: solo lectura contra CloudStorage
      # (descarga adjuntos/documentos), nunca sube.
      ServiceAuth__Clients__6__ClientId: ${POSTMASTER_SERVICE_CLIENT_ID:-postmaster-worker}
      ServiceAuth__Clients__6__Secret: ${POSTMASTER_SERVICE_CLIENT_SECRET:-}
      ServiceAuth__Clients__6__Permissions__0: cloudstorage.file.download
      ServiceAuth__Clients__6__Permissions__1: cloudstorage.file.view
      # Cliente de servicio (M2M) para Communication (F8 attach-recording): valida
      # metadata de grabaciones contra CloudStorage. Ya estaba registrado en los
      # user-secrets locales de Auth (Clients:2) pero nunca se copio a este compose
      # — communication-api hubiera fallado con invalid_client en Docker/produccion.
      ServiceAuth__Clients__7__ClientId: ${COMMUNICATION_SERVICE_AUTH_CLIENT_ID:-communication-worker}
      ServiceAuth__Clients__7__Secret: ${COMMUNICATION_SERVICE_AUTH_CLIENT_SECRET:-}
      ServiceAuth__Clients__7__Permissions__0: cloudstorage.file.upload
      ServiceAuth__Clients__7__Permissions__1: cloudstorage.file.download
      ServiceAuth__Clients__7__Permissions__2: cloudstorage.file.view
      # Cliente de servicio (M2M) para Tenant (Tenant_Service_LogoSupport_Plan.md): sube el logo
      # directo a MinIO con credenciales propias (Fase D1, ver Tenant__Minio__* mas abajo) y solo
      # usa este token para pedir el download-url presignado y borrar el logo reemplazado/quitado.
      # Nunca sube via CloudStorage HTTP, por eso sin cloudstorage.file.upload.
      ServiceAuth__Clients__8__ClientId: ${TENANT_SERVICE_CLIENT_ID:-tenant-worker}
      ServiceAuth__Clients__8__Secret: ${TENANT_SERVICE_CLIENT_SECRET:-}
      ServiceAuth__Clients__8__Permissions__0: cloudstorage.file.download
      ServiceAuth__Clients__8__Permissions__1: cloudstorage.file.delete
      # Clientes M2M de Payment para el protocolo quote/reserve/commit/cancel.
      # Audience y scopes son obligatorios; Growth no acepta un token genérico de servicios.
      ServiceAuth__Clients__9__ClientId: ${PAYMENTAPP_GROWTH_CLIENT_ID:-payment-app-growth}
      ServiceAuth__Clients__9__Secret: ${PAYMENTAPP_GROWTH_CLIENT_SECRET:-}
      ServiceAuth__Clients__9__Audience: taxvision-growth
      ServiceAuth__Clients__9__Scopes__0: growth.codes.quote
      ServiceAuth__Clients__9__Scopes__1: growth.codes.reserve
      ServiceAuth__Clients__9__Scopes__2: growth.codes.commit
      ServiceAuth__Clients__9__Scopes__3: growth.codes.cancel
      ServiceAuth__Clients__9__Scopes__4: growth.codes.compensate
      ServiceAuth__Clients__9__Scopes__5: growth.referrals.qualify
      ServiceAuth__Clients__10__ClientId: ${PAYMENTCLIENT_GROWTH_CLIENT_ID:-payment-client-growth}
      ServiceAuth__Clients__10__Secret: ${PAYMENTCLIENT_GROWTH_CLIENT_SECRET:-}
      ServiceAuth__Clients__10__Audience: taxvision-growth
      ServiceAuth__Clients__10__Scopes__0: growth.codes.quote
      ServiceAuth__Clients__10__Scopes__1: growth.codes.reserve
      ServiceAuth__Clients__10__Scopes__2: growth.codes.commit
      ServiceAuth__Clients__10__Scopes__3: growth.codes.cancel
      ServiceAuth__Clients__10__Scopes__4: growth.codes.compensate
      ServiceAuth__Clients__11__ClientId: ${SUBSCRIPTION_GROWTH_CLIENT_ID:-subscription-growth}
      ServiceAuth__Clients__11__Secret: ${SUBSCRIPTION_GROWTH_CLIENT_SECRET:-}
      ServiceAuth__Clients__11__Audience: taxvision-growth
      ServiceAuth__Clients__11__Scopes__0: growth.referrals.reward.confirm
      ServiceAuth__Clients__11__Scopes__1: growth.grants.confirm
      # Bootstrap del primer PlatformAdmin (PlatformAdminBootstrapService.cs) — el token
      # llegaba a .env vía deploy.yml pero nunca se mapeaba acá, asi que no hacia nada.
      # Default Enabled=false a proposito: si esta en true pero Email/InvitationToken
      # faltan o son invalidos, el hosted service tira InvalidOperationException al
      # arrancar y tumba todo auth-api. Activar explicitamente (PLATFORM_BOOTSTRAP_ENABLED=true)
      # solo para el deploy que crea al primer PlatformAdmin, despues se puede dejar
      # en true sin riesgo — el service detecta que ya existe un PlatformAdmin y hace no-op.
      PlatformBootstrap__Enabled: ${PLATFORM_BOOTSTRAP_ENABLED:-false}
      PlatformBootstrap__Email: ${PLATFORM_BOOTSTRAP_EMAIL:-}
      PlatformBootstrap__InvitationToken: ${PLATFORM_BOOTSTRAP_INVITATION_TOKEN:-}
      # Recovery path (PlatformAdminEmergencyAccessService.cs): crea un PlatformAdmin directo
      # (sin invitación) cuando no hay ningún PlatformAdmin operativo para invitar a otro.
      # Mismo riesgo de arranque que PlatformBootstrap arriba si Enabled=true sin los demás
      # campos completos — dejar en false salvo el deploy puntual que necesita el recovery.
      # Idempotente por email: no pisa un usuario ya creado, así que puede quedar en true
      # sin riesgo despues del primer uso exitoso (aunque igual conviene apagarlo).
      PlatformEmergencyAccess__Enabled: ${PLATFORM_EMERGENCY_ENABLED:-false}
      PlatformEmergencyAccess__Email: ${PLATFORM_EMERGENCY_EMAIL:-}
      PlatformEmergencyAccess__Name: ${PLATFORM_EMERGENCY_NAME:-}
      PlatformEmergencyAccess__LastName: ${PLATFORM_EMERGENCY_LASTNAME:-}
      PlatformEmergencyAccess__PasswordHash: ${PLATFORM_EMERGENCY_PASSWORD_HASH:-}
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317
    volumes:
      - taxvision-logs:/app/Logs
      - ${TAXVISION_SECRETS_DIR:-/opt/taxvision/secrets}/jwt-private.pem:/run/secrets/jwt-private.pem:ro
      - ${TAXVISION_SECRETS_DIR:-/opt/taxvision/secrets}/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    # /health/ready ya existe (Program.cs: sql-server + redis + rabbitmq, tag "ready") — solo
    # faltaba exponerlo como HEALTHCHECK de Docker para que otros servicios puedan hacer
    # depends_on: condition: service_healthy sobre auth-api (antes ningún servicio .NET tenía
    # HEALTHCHECK, así que ese condition nunca era una opción real). start_period generoso
    # porque auth-api corre varios hosted services de bootstrap (PlatformAdmin/backfills) antes
    # de aceptar trafico.
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - taxvision-network

  customer-api:
    image: taxvision/customer-api:dev
    container_name: taxvision-customer-api
    build:
      context: ../..
      dockerfile: src/Services/Customer/TaxVision.Customer.Api/Dockerfile
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: ${CUSTOMER_DB_CONNECTION:?Set CUSTOMER_DB_CONNECTION in .env}
      ConnectionStrings__Redis: redis:6379
      RabbitMq__Uri: ${RABBITMQ_CONNECTION:?Set RABBITMQ_CONNECTION in .env}
      # RS256: la clave publica alcanza para validar — la privada vive solo en auth-api.
      Jwt__PublicKeyPath: /run/secrets/jwt-public.pem
      Jwt__Issuer: TaxVision.Auth
      Jwt__Audience: TaxVision.Services
      # Microservicio CloudStorage donde vive el archivo de import mientras se procesa.
      CloudStorageClient__BaseUrl: http://cloudstorage-api:8080
