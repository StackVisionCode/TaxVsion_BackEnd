  notification-api:
    image: taxvision/notification-api:dev
    container_name: taxvision-notification-api
    build:
      context: ../..
      dockerfile: src/Services/Notification/TaxVision.Notification.Api/Dockerfile
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: ${NOTIFICATION_DB_CONNECTION:?Set NOTIFICATION_DB_CONNECTION in .env}
      ConnectionStrings__Redis: redis:6379
      RabbitMq__Uri: ${RABBITMQ_CONNECTION:?Set RABBITMQ_CONNECTION in .env}
      # RS256: la clave publica alcanza para validar — la privada vive solo en auth-api.
      Jwt__PublicKeyPath: /run/secrets/jwt-public.pem
      Jwt__Issuer: TaxVision.Auth
      Jwt__Audience: TaxVision.Services
      Portal__BaseUrl: ${PORTAL_BASE_URL:-http://localhost:4200}
      Portal__BaseDomain: ${TAXVISION_BASE_DOMAIN:-taxprocore.com}
      # Hardening Fase 21 (2026-07-18) — default flippeado a true: Postmaster es ahora el único
      # camino de envío real de Notification (Fases 17-20 retiraron/migraron todo lo que competía:
      # módulo de mailbox/sync duplicado, self-service de templates por HTTP, y el transporte SMTP
      # directo de EmailDeliveryService/InProcessEmailDispatchGateway ganó su equivalente
      # event-based). Rollback: setear NOTIFICATION_USE_POSTMASTER_DISPATCH=false en el .env de
      # despliegue — el path in-process/SMTP-directo sigue vivo, sin eliminar (retiro real es
      # trabajo futuro fuera de este plan, condicionado a confianza operacional en producción).
      Notification__UsePostmasterDispatch: ${NOTIFICATION_USE_POSTMASTER_DISPATCH:-true}
      # Fase 7 del plan de notificaciones dinámicas — default false hasta generar el proyecto en
      # Firebase Console (Configuración del proyecto -> Cuentas de servicio -> Generar nueva clave
      # privada) y decodificar FIREBASE_SERVICE_ACCOUNT_JSON_B64 en TAXVISION_SECRETS_DIR (ver
      # README §Push notifications). El path solo se lee si el flag está en true — FcmPushSender
      # nunca se registra en false, así que un JSON ausente/vacío no rompe el arranque.
      Notification__UseFcmPush: ${NOTIFICATION_USE_FCM_PUSH:-false}
      Notification__Push__Fcm__ServiceAccountJsonPath: /run/secrets/firebase-service-account.json
      Smtp__Host: ${SMTP_HOST:-}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__User: ${SMTP_USER:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__FromAddress: ${SMTP_FROM:-no-reply@taxvision.local}
      # Clave de cifrado de secretos del módulo email (config SMTP/API).
      # Base64 de 32 bytes; requerida para los endpoints de configuración de correo.
      Encryption__MasterKey: ${ENCRYPTION_MASTER_KEY:-}
      # Microservicio CloudStorage donde se guardan HTML/design/preview de plantillas y layouts
      # (contexto de request, JWT del usuario/M2M).
      CloudStorageClient__BaseUrl: http://cloudstorage-api:8080
      # Microservicio Scribe — IScribeRenderClient le pega a esto para renderizar plantillas
      # (path de dispatch basado en render). Sin esta linea, ScribeRenderClient no tiene forma
      # de alcanzar scribe-api dentro de docker y el render en vivo falla.
      ScribeClient__BaseUrl: http://scribe-api:8080
      # Credenciales de servicio (M2M) para el CloudStorageClient de arriba (plantillas/layouts).
      ServiceAuthClient__AuthBaseUrl: http://auth-api:8080
      ServiceAuthClient__ClientId: ${NOTIFICATION_SERVICE_CLIENT_ID:-notification-worker}
      ServiceAuthClient__ClientSecret: ${NOTIFICATION_SERVICE_CLIENT_SECRET:-}
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317
    volumes:
      - taxvision-logs:/app/Logs
      - ${TAXVISION_SECRETS_DIR:-/opt/taxvision/secrets}/jwt-public.pem:/run/secrets/jwt-public.pem:ro
      # Igual que jwt-public.pem/signature-sealing.pfx: el archivo debe existir en
      # TAXVISION_SECRETS_DIR (aunque sea un placeholder vacío) para que el mount no falle,
      # incluso con Notification__UseFcmPush=false — el contenido solo se lee cuando el flag
      # está en true.
      - ${TAXVISION_SECRETS_DIR:-/opt/taxvision/secrets}/firebase-service-account.json:/run/secrets/firebase-service-account.json:ro
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
