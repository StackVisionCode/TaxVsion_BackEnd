    build:
      context: ../..
      dockerfile: src/Services/Postmaster/TaxVision.Postmaster.Api/Dockerfile
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: ${POSTMASTER_DB_CONNECTION:?Set POSTMASTER_DB_CONNECTION in .env}
      ConnectionStrings__Redis: redis:6379
      RabbitMq__Uri: ${RABBITMQ_CONNECTION:?Set RABBITMQ_CONNECTION in .env}
      # RS256: la clave publica alcanza para validar — la privada vive solo en auth-api.
      Jwt__PublicKeyPath: /run/secrets/jwt-public.pem
      Jwt__Issuer: TaxVision.Auth
      Jwt__Audience: TaxVision.Services
      # Clave de cifrado de secretos (SMTP password de TenantEmailProvider, ver Fase 3.5).
      Encryption__MasterKey: ${ENCRYPTION_MASTER_KEY:-}
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317
      # Credenciales de servicio (M2M) contra Auth — mismo patron que Correspondence__ServiceAuth.
      Postmaster__ServiceAuth__AuthBaseUrl: http://auth-api:8080
      Postmaster__ServiceAuth__ClientId: ${POSTMASTER_SERVICE_CLIENT_ID:-postmaster-worker}
      Postmaster__ServiceAuth__ClientSecret: ${POSTMASTER_SERVICE_CLIENT_SECRET:?Set POSTMASTER_SERVICE_CLIENT_SECRET in .env}
      # Descarga de adjuntos/documentos desde CloudStorage (solo lectura, nunca sube).
      Postmaster__CloudStorage__BaseUrl: http://cloudstorage-api:8080
      # Canal de envío #3 (TenantOAuth, D3) — M2M a Connectors para enviar vía Gmail/Graph conectado.
      Postmaster__Connectors__BaseUrl: http://connectors-api:8080
      # Proveedor SMTP real de plataforma (SystemEmailProviderSeeder.cs) — reconcilia la fila
      # "smtp-default" en cada boot si SYSTEM_EMAIL_HOST viene seteado, sin pasar por el endpoint
      # admin (util cuando no hay acceso PlatformAdmin). Vacio = queda el placeholder de siempre,
      # no rompe nada. El password viaja cifrado a la base via Encryption__MasterKey de arriba.
      SystemEmailProvider__Host: ${SYSTEM_EMAIL_HOST:-}
      SystemEmailProvider__Port: ${SYSTEM_EMAIL_PORT:-587}
      SystemEmailProvider__UseTls: ${SYSTEM_EMAIL_USE_TLS:-true}
      SystemEmailProvider__Username: ${SYSTEM_EMAIL_USERNAME:-}
      SystemEmailProvider__Password: ${SYSTEM_EMAIL_PASSWORD:-}
      SystemEmailProvider__FromAddressDefault: ${SYSTEM_EMAIL_FROM_ADDRESS:-}
      SystemEmailProvider__FromDisplayNameDefault: ${SYSTEM_EMAIL_FROM_NAME:-}
      SystemEmailProvider__DisplayName: ${SYSTEM_EMAIL_DISPLAY_NAME:-}
    volumes:
      - taxvision-logs:/app/Logs
      - ${TAXVISION_SECRETS_DIR:-/opt/taxvision/secrets}/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - taxvision-network

  scribe-api:
