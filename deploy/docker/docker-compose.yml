      Customer__Minio__Endpoint: minio:9000
      Customer__Minio__UseTls: "false"
      Customer__Minio__AccessKey: customer-worker
      Customer__Minio__SecretKey: ${CUSTOMER_MINIO_SECRET:?Set CUSTOMER_MINIO_SECRET in .env}
      Customer__Minio__TempBucket: taxvision-temp
      Customer__Minio__SourcePrefix: customer
